<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREQUENCY 528 IRON</title>
    <style>
        body {
            /* Sheer black background (semi-transparent deep black over solid black) */
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.95)), #000000; 
            color: #a6a6a6; /* Deep industrial grey base text */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 1000px;
            padding: 40px 20px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Main Headline - Chrome Red shifting into Silver Grey */
        h1 {
            font-size: 4.5rem; 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 0;
            background: linear-gradient(to bottom, #ff1a1a 0%, #a6a6a6 50%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(5px 5px 10px rgba(0, 0, 0, 0.9));
        }

        /* The 528 Brand Number - Brassy Glow with Shadow Font */
        .brand-number {
            font-size: 7rem; 
            font-weight: 900;
            display: block;
            margin: 5px 0;
            background: linear-gradient(135deg, #e6b800 0%, #b8860b 50%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 0px 20px rgba(218, 165, 32, 0.6)) drop-shadow(4px 4px 15px rgba(0, 0, 0, 0.9));
            animation: pulse-frequency 3s infinite ease-in-out;
        }

        /* IRON Subtitle - Chrome Silver & Grey */
        .brand-sub {
            font-size: 2.8rem; 
            letter-spacing: 12px;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 40px;
            background: linear-gradient(to right, #d9d9d9, #8c8c8c, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(3px 3px 5px rgba(0, 0, 0, 0.8));
        }

        /* Pulsing Frequency Animation - Shifted from blue to brassy gold glow */
        @keyframes pulse-frequency {
            0% { 
                transform: scale(1); 
                filter: drop-shadow(0px 0px 15px rgba(218, 165, 32, 0.5)) drop-shadow(4px 4px 15px rgba(0, 0, 0, 0.9)); 
            }
            50% { 
                transform: scale(1.03); 
                filter: drop-shadow(0px 0px 25px rgba(218, 165, 32, 0.8)) drop-shadow(4px 4px 15px rgba(0, 0, 0, 0.9)); 
            }
            100% { 
                transform: scale(1); 
                filter: drop-shadow(0px 0px 15px rgba(218, 165, 32, 0.5)) drop-shadow(4px 4px 15px rgba(0, 0, 0, 0.9)); 
            }
        }

        .cta-button {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            padding: 15px 30px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s ease;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        .cta-button:hover {
            background-color: #e6b800; /* Turns brassy gold on hover */
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(218, 165, 32, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ITS NOT JUST IRON ...ITS</h1>
        <span class="brand-number">528</span>
        <div class="brand-sub">IRON</div>
        
        <a href="#contact" class="cta-button">Explore the Craft</a>
    </div>

</body>
</html>
