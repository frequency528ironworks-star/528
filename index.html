<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREQUENCY 528 IRON</title>
    <style>
        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero-section {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            letter-spacing: 2px;
        }

        .hero-container {
            text-align: center;
            max-width: 1000px;
            width: 100%;
        }

        /* Top Line: Crimson/Muted Red Industrial Font */
        .hero-sub-glow {
            font-family: 'Impact', 'Arial Black', sans-serif;
            color: #ff2a2a;
            font-size: 2.5rem;
            text-transform: uppercase;
            margin: 0 0 15px 0;
            text-shadow: 0 0 15px rgba(255, 42, 42, 0.4);
        }

        /* Middle Line: Glowing Brass / Deep Gold Gradient */
        .hero-brand-gold {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 6.5rem;
            text-transform: uppercase;
            margin: 0;
            background: linear-gradient(180deg, #ffe066 0%, #f5b000 40%, #a67c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 25px rgba(245, 176, 0, 0.6));
            line-height: 1.1;
        }

        /* Bottom Line: Polished Chrome Gradient */
        .hero-brand-chrome {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 6rem;
            text-transform: uppercase;
            margin: 10px 0 50px 0;
            background: linear-gradient(180deg, #ffffff 0%, #e0e0e0 45%, #888888 50%, #d5d5d5 55%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.9));
            line-height: 1;
        }

        /* Sleek Premium Industrial Button */
        .hero-btn {
            display: inline-block;
            padding: 16px 45px;
            background: linear-gradient(180deg, #222222 0%, #111111 100%);
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 3px;
            border: 1px solid #444444;
            box-shadow: 0 8px 20px rgba(0,0,0,0.7);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            border-radius: 2px;
        }

        .hero-btn:hover {
            border-color: #f5b000;
            color: #f5b000;
            box-shadow: 0 0 20px rgba(245, 176, 0, 0.3);
            transform: translateY(-2px);
        }

        /* Responsive Breakpoints for Mobile/Tablets */
        @media (max-width: 768px) {
            .hero-sub-glow { 
                font-size: 1.6rem; 
                margin-bottom: 10px;
            }
            .hero-brand-gold { 
                font-size: 3.8rem; 
            }
            .hero-brand-chrome { 
                font-size: 3.5rem; 
                margin-bottom: 35px;
            }
            .hero-btn { 
                padding: 14px 30px; 
                font-size: 0.8rem; 
            }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="hero-container">
            <h2 class="hero-sub-glow">IT'S NOT JUST IRON... IT'S</h2>
            <h1 class="hero-brand-gold">'FREQUENCY 528'</h1>
            <h1 class="hero-brand-chrome">IRON</h1>
            
            <a href="#explore" class="hero-btn">EXPLORE THE CRAFTSMANSHIP</a>
        </div>
    </section>

</body>
</html>
