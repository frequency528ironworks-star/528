<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequency 528 Iron Works</title>
    <style>
        :root {
            --bg-black: #050505;
            --shadow-gray: #1a1a1a;
            --sub-gray: #a39073;
            --glow-color: rgba(224, 169, 74, 0.35);
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-black);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            cursor: pointer;
        }
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background-color: rgba(5, 5, 5, 0.95);
            padding: 1.5rem 1rem;
            text-align: left;
            border-bottom: 1px solid #161616;
            box-sizing: border-box;
        }
        .logo {
            font-family: 'Impact', Arial, sans-serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: #ffffff;
        }
        .logo span {
            color: #bfa16f;
        }
        .top-left-contact {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #8c816f;
            letter-spacing: 1px;
            text-transform: uppercase;
            line-height: 1.4;
        }
        .top-left-contact a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            margin-left: 4px;
        }
        .top-left-contact a:hover {
            color: #cca450;
        }
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1rem;
            text-align: center;
            box-sizing: border-box;
            width: 100%;
            margin-top: 120px; 
        }
        
        /* FIXED KEYFRAMES: Starts real small/squeezed and grows to a non-slanted, dramatic large size */
        @keyframes frequencyWave {
            0% { 
                transform: scale(0.15); 
                letter-spacing: -10px;
                filter: drop-shadow(0 0 2px rgba(240, 192, 108, 0.2)); 
                opacity: 0.15;
            }
            50% { 
                transform: scale(1.05); 
                letter-spacing: 4px;
                filter: drop-shadow(0 0 35px rgba(240, 192, 108, 0.85)); 
                opacity: 1;
            }
            100% { 
                transform: scale(0.15); 
                letter-spacing: -10px;
                filter: drop-shadow(0 0 2px rgba(240, 192, 108, 0.2)); 
                opacity: 0.15;
            }
        }
        
        /* FIXED H1: Bold Impact font, no slanting/skew variables used */
        h1 {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: calc(1.8rem + 2vw);
            line-height: 1.2;
            margin: 0 0 1.5rem 0;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff 0%, #f3dfa2 30%, #cca450 55%, #ae802b 75%, #ecc670 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            width: 100%;
            word-wrap: break-word;
            animation: frequencyWave 4.5s ease-in-out infinite;
        }
        .subtext {
            font-size: 1rem;
            font-weight: bold;
            color: var(--sub-gray);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0 0 3rem 0;
