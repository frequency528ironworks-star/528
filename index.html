<div id="ai-chat-container" style="position: fixed; bottom: 20px; right: 20px; width: 350px; background: #101010 !important; border: 1px solid #d4af37 !important; border-radius: 8px; z-index: 10000; font-family: 'Inter', sans-serif; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
    <div style="background: #070707 !important; padding: 12px; border-bottom: 1px solid #232323; border-top-left-radius: 7px; border-top-right-radius: 7px; color: #d4af37 !important; font-weight: bold; font-family: 'Cinzel', serif; font-size: 0.9rem; letter-spacing: 1px; text-align: center;">
        ITS NOT JUST IRON ...ITS 'FREQUENCY 528' IRON
    </div>
    
    <div id="chatMessages" style="height: 260px; padding: 15px; overflow-y: auto; color: #e8e8e8 !important; font-size: 0.85rem; display: flex; flex-direction: column; gap: 10px; background: #101010 !important;">
        <div style="background: #161616 !important; padding: 8px 12px; border-radius: 6px; align-self: flex-start; max-width: 85%; border-left: 2px solid #d4af37 !important;">
            Hello! Describe your vision or upload a photo of your yard, windows, or entrance, and let's design your custom ironwork.
        </div>
    </div>
    
    <div style="padding: 10px; border-top: 1px solid #232323; display: flex; flex-direction: column; gap: 8px; background: #070707 !important; border-bottom-left-radius: 7px; border-bottom-right-radius: 7px;">
        <input type="file" id="chatFileInput" accept="image/*" style="display: none;">
        
        <div style="display: flex; gap: 8px; align-items: center;">
            <button id="attachBtn" type="button" style="background: #161616; color: #d4af37; border: 1px solid #232323; padding: 8px 10px; border-radius: 4px; cursor: pointer; font-size: 1rem;" title="Upload Photo">📷</button>
            
            <input type="text" id="userInput" placeholder="Describe your vision..." style="flex: 1; background: #161616 !important; border: 1px solid #232323 !important; color: #e8e8e8 !important; padding: 8px 12px; border-radius: 4px; font-size: 0.85rem; outline: none;">
            <button id="sendBtn" style="background: #d4af37 !important; color: #070707 !important; border: none; padding: 8px 14px; border-radius: 4px; font-weight: bold; font-size: 0.85rem; cursor: pointer;">Send</button>
        </div>
        <div id="fileStatus" style="color: #d4af37; font-size: 0.75rem; padding-left: 5px;"></div>
    </div>
</div>
