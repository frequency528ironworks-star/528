<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREQUENCY 528 IRON</title>
    <style>
        /* Deep, premium industrial dark theme covering the full viewport */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background-color: #000000;
            color: #d1d1d6;
            font-family: 'Impact', 'Arial Black', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        /* Rugged, centered panel to anchor the layout */
        .forge-panel {
            max-width: 1200px;
            width: 90%;
            padding: 40px 20px;
            text-align: center;
        }

        /* LINE 1: ITS NOT JUST IRON ...ITS (Heavy Chrome Red Gradient) */
        .line-lead {
            font-size: 3.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin: 0 0 10px 0;
            display: block;
            background: linear-gradient(to bottom, #ff1a1a 0%, #990000 70%, #2b0000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 5px rgba(0, 0, 0, 0.95));
        }

        /* LINE 2: 'FREQUENCY 528' (Heavy Brass Finish with Deep Shadow Depth) */
        .line-core {
            font-size: 7.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 5px 0;
            display: block;
            background: linear-gradient(135deg, #ffd700 0%, #b8860b 40%, #8b6508 70%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 0px 25px rgba(184, 134, 11, 0.4)) drop-shadow(6px 8px 15px rgba(0, 0, 0, 0.95));
            animation: heavy-pulse 4s infinite ease-in-out;
        }

        /* LINE 3: IRON (Polished Industrial Chrome/Grey Gradient) */
        .line-tail {
            font-size: 5.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 20px;
            margin: 10px 0 0 0;
            display: block;
            background: linear-gradient(to bottom, #ffffff 0%, #8c8c8c 50%, #333333 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 6px rgba(0, 0, 0, 0.95));
        }

        /* Clean, high-end metallic breathing movement */
        @keyframes heavy-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); filter: drop-shadow(0px 0px 35px rgba(184, 134, 11, 0.6)) drop-shadow(6px 8px 15px rgba(0, 0, 0, 0.95)); }
            100% { transform: scale(1); }
        }

        /* Solid Steel Call To Action Button */
        .cta-forge {
            display: inline-block;
            background: #ffffff;
            color: #000000;
            padding: 18px 45px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-decoration: none;
            margin-top: 60px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .cta-forge:hover {
            background-color: #b8860b;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(184, 134, 11, 0.6);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="forge-panel">
        <span class="line-lead">ITS NOT JUST IRON ...ITS</span>
        <span class="line-core">'FREQUENCY 528'</span>
        <span class="line-tail">IRON</span>
        
        <a href="#contact" class="cta-forge">Explore the Craftsmanship</a>
    </div>

</body>
</html>
