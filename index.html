<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT NOT JUST IRON...ITS FREQUENCY 528 IRON</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        html { scroll-behavior: smooth; }
        body { background-color: #0a0a0a; color: #e5e5e5; line-height: 1.6; padding-top: 160px; overflow-x: hidden; }

        /* --- PROFESSIONAL BALANCED HEADER --- */
        .fixed-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 160px;
            background-color: #000000;
            border-bottom: 1px solid #333;
            display: flex; align-items: flex-end; /* Pushes content down */
            justify-content: space-between;
            padding: 20px 4%;
            z-index: 9999;
        }

        .header-nav-left { display: flex; gap: 20px; padding-bottom: 10px; }
        .header-nav-left a { color: #888; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .header-nav-left a:hover { color: #d4af37; }

        .logo-container { text-align: center; flex: 2; padding-bottom: 10px; }
        .main-logo-text {
            font-weight: 800; font-size: 1.2rem; text-transform: uppercase;
            background: linear-gradient(90deg, #aa7c11, #f3e5ab, #aa7c11);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeInOut 4s infinite ease-in-out, shimmer 3s infinite linear;
        }

        @keyframes fadeInOut { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .header-contact-right { text-align: right; font-size: 0.75rem; padding-bottom: 10px; line-height: 1.4; }
        .header-contact-right span { color: #d4af37; }

        /* --- COMPACT WORKSPACE BLOCKS --- */
        .freeform-canvas { max-width: 1100px; margin: 0 auto; padding: 20px 4%; }
        .workspace-block {
            background-color: #111; border: 1px solid #222; border-radius: 12px;
            padding: 30px; /* Reduced from 48px */
            margin-bottom: 30px; /* Reduced from 56px */
        }
        .block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .block-title { font-size: 1.5rem; font-weight: 700; color: #fff; }
        .edit-btn { background: #1a1a1a; color: #d4af37; border: 1px solid #d4af37; padding: 5px 12px; border-radius: 6px; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; }

        /* Standardized Form elements for cleaner look */
        .input-group { margin-bottom: 15px; }
        input, textarea { width: 100%; background: #161616; border: 1px solid #333; padding: 10px; border-radius: 6px; color: #fff; }
        .ai-submit-btn { background: #d4af37; color: #000; border: none; padding: 10px 20px; border-radius: 6px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <header class="fixed-header">
        <nav class="header-nav-left">
            <a href="#ai-portal">Portal</a>
            <a href="#portfolio">Portfolio</a>
        </nav>

        <div class="logo-container">
            <div class="main-logo-text">FREQUENCY 528 IRON</div>
        </div>

        <div class="header-contact-right">
            <div>Shane: <span>404-807-5409</span></div>
            <div>Heyleigh: <span>478-331-8547</span></div>
        </div>
    </header>

    <main class="freeform-canvas">
        <section id="ai-portal" class="workspace-block">
            <div class="block-header">
                <h2 class="block-title">AI Concept Visualizer</h2>
                <button class="edit-btn">Edit / Sign In</button>
            </div>
            <form>
                <div class="input-group">
                    <input type="text" placeholder="Your Name">
                </div>
                <button class="ai-submit-btn">Transmit Concept</button>
            </form>
        </section>
        
        <!-- Rest of your sections would follow this compact pattern -->
    </main>
</body>
</html>
