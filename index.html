<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREQUENCY 528 IRON</title>
    <style>
        /* Forces a deep sheer black background across the full screen */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.95)), #000000; 
            color: #a6a6a6; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-sizing: border-box;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* LINE 1: FREQUENCY (ALL CAPS - Chrome Red & Silver Grey Gradient) */
        .brand-lead {
            font-size: 5rem; 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 12px;
            margin: 0;
            padding: 0;
            display: block;
            width: 100%;
            background: linear-gradient(to bottom, #ff1a1a 0%, #a6a6a6 60%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(5px 5px 10px rgba(0, 0, 0, 0.9));
        }

        /* LINE 2: 528 (Brassy Metallic Finish with Deep Glowing Aura Shadow Font) */
        .brand-core {
            font-size: 9rem; 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin: 10px 0;
            padding: 0;
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #e6b800 0%, #b8860b 50%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 0px 25px rgba(218, 165, 32, 0.7)) drop-shadow(5px 5px 15px rgba(0, 0, 0, 0.9));
            animation: pulse-frequency 3s infinite ease-in-out;
        }

        /* LINE 3: IRON (ALL CAPS - Polished Chrome Silver & Industrial Grey) */
        .brand-tail {
            font-size: 5.5rem; 
            letter-spacing: 20px;
            font-weight: 800;
            text-transform: uppercase;
            margin: 0;
            padding: 0;
            display: block;
            width: 100%;
            background: linear-gradient(to right, #ffffff, #8c8c8c, #d9d9d9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(4px 4px 8px rgba(0, 0, 0, 0.8));
        }

        /* Brassy Gold Pulse Wave Animation */
        @keyframes pulse-frequency {
            0% { 
                transform: scale(1); 
                filter: drop-shadow(0px 0px 20px rgba(218, 165, 32, 0.5)) drop-shadow(5px 5px 15px rgba(0, 0, 0, 0.9)); 
            }
            50% { 
                transform: scale(1.02); 
                filter: drop-shadow(0px 0px 35px rgba(218, 165, 32, 0.9)) drop-shadow(5px 5px 15px rgba(0, 0, 0, 0.9)); 
            }
            100% { 
                transform: scale(1); 
                filter: drop-shadow(0px 0px 20px rgba(218, 165, 32, 0.5)) drop-shadow(5px 5px 15px rgba(0, 0, 0, 0.9)); 
            }
        }

        .cta-button {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            padding: 16px 36px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            border-radius: 4px;
            transition: all 0.3s ease;
            margin-top: 60px;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.1);
        }

        .cta-button:hover {
            background-color: #e6b800; 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(218, 165, 32, 0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="brand-lead">FREQUENCY</span>
        <span class="brand-core">528</span>
        <span class="brand-tail">IRON</span>
        
        <a href="#contact" class="cta-button">Explore the Craft</a>
    </div>

</body>
</html>
