<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequency 528 Iron Works</title>
    <style>
        :root {
            --bg-black: #050505;
            --shadow-gray: #1a1a1a;
            --sub-gray: #a39073;
            --glow-color: rgba(224, 169, 74, 0.35);
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-black);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            cursor: pointer;
        }
        header {
            position: relative;
            background-color: rgba(5, 5, 5, 0.95);
            padding: 1.5rem 1rem;
            text-align: left;
            border-bottom: 1px solid #161616;
            box-sizing: border-box;
        }
        .logo {
            font-family: 'Impact', Arial, sans-serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: #ffffff;
        }
        .logo span {
            color: #bfa16f;
        }
        .top-left-contact {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #8c816f;
            letter-spacing: 1px;
            text-transform: uppercase;
            line-height: 1.4;
        }
        .top-left-contact a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            margin-left: 4px;
        }
        .top-left-contact a:hover {
            color: #cca450;
        }
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1rem;
            text-align: center;
            box-sizing: border-box;
            width: 100%;
        }
        @keyframes frequencyWave {
            0% { text-shadow: 0 0 5px rgba(240, 192, 108, 0.3); }
            50% { text-shadow: 0 0 25px rgba(240, 192, 108, 0.8); }
            100% { text-shadow: 0 0 5px rgba(240, 192, 108, 0.3); }
        }
        h1 {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: calc(1.8rem + 2vw);
            line-height: 1.2;
            margin: 1.5rem 0;
            text-transform: uppercase;
            color: #f3dfa2;
            animation: frequencyWave 3s ease-in-out infinite;
        }
        .subtext {
            font-size: 1rem;
            font-weight: bold;
            color: var(--sub-gray);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0 0 3rem 0;
            line-height: 1.4;
        }
