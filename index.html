<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequency 528 Iron Works</title>
    <style>
        :root {
            --bg-color: #ffffff; /* White background */
            --text-color: #000000; /* Bold Black text */
            --ice-blue: #a3e5ff; /* Icy Water Blue */
            --border-color: #111111;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2rem;
            text-align: left;
            border-bottom: 1px solid #eeeeee;
        }

        .logo {
            font-family: 'Impact', Arial, sans-serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: #000;
        }

        .logo span {
            color: #333;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        /* Business Card Oval Stamp Layout */
        .stamp-card {
            border: 4px solid var(--border-color);
            border-radius: 50%; /* Makes it a perfect oval stamp */
            padding: 4rem 6rem;
            max-width: 700px;
            background: #ffffff;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.05);
            display: inline-block;
        }

        h1 {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 3.5rem;
            line-height: 1.2;
            letter-spacing: 2px;
            margin: 0 0 1.5rem 0;
            color: var(--text-color);
            text-transform: uppercase;
        }

        /* Icy Water Blue Shadow Effect */
        .highlight {
            text-shadow: 0px 0px 15px var(--ice-blue), 3px 3px 0px var(--ice-blue);
        }

        .subtext {
            font-size: 1.1rem;
            font-weight: bold;
            color: #333333;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0;
        }

        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid #eeeeee;
            color: #666666;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">FREQUENCY-<span>528</span> // IRON WORKS</div>
    </header>

    <div class="container">
        <div class="stamp-card">
            <h1>ITS NOT JUST IRON ...<br>ITS <span class="highlight">"FREQUENCY 528"</span> IRON</h1>
            <p class="subtext">Custom Craftsmanship // High-Vibrational Metalwork</p>
        </div>
    </div>

    <footer>
        &copy; 2026 FREQUENCY 528 IRON WORKS. ALL RIGHTS RESERVED.
    </footer>

</body>
</html>
