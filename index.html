<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequency 528 Iron Works</title>
    <style>
        :root {
            --bg-black: #050505;
            --shadow-gray: #1a1a1a;
            --sub-gray: #a39073;
            --glow-color: rgba(224, 169, 74, 0.35);
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-black);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            cursor: pointer;
        }
        
        /* FIXED HEADER */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background-color: rgba(5, 5, 5, 0.95);
            padding: 1.5rem 1rem;
            text-align: left;
            border-bottom: 1px solid #161616;
            box-sizing: border-box;
        }
        .logo {
            font-family: 'Impact', Arial, sans-serif;
            font-size: 1.2rem;
            letter-spacing: 1px;
            color: #ffffff;
        }
        .logo span {
            color: #bfa16f;
        }
        .top-left-contact {
            margin-top: 0.5rem;
            font-size: 0.8rem;
            color: #8c816f;
            letter-spacing: 1px;
            text-transform: uppercase;
            line-height: 1.4;
        }
        .top-left-contact a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            margin-left: 4px;
        }
        .top-left-contact a:hover {
            color: #cca450;
        }
        
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2.5rem 1rem;
            text-align: center;
            box-sizing: border-box;
            width: 100%;
            margin-top: 120px; 
        }

        /* DRAMATIC VIBRATION ANIMATION (Small to Large) */
        @keyframes frequencyWave {
            0% {
                transform: scale(0.2) skewX(-6deg);
                letter-spacing: -12px;
                filter: drop-shadow(0 0 2px var(--glow-color));
                opacity: 0.2;
            }
            50% {
                transform: scale(1.05) skewX(6deg);
                letter-spacing: 5px;
                filter: drop-shadow(0 0 40px rgba(240, 192, 108, 0.85)) drop-shadow(4px 4px 15px #000000);
                opacity: 1;
            }
            100% {
                transform: scale(0.2) skewX(-6deg);
                letter-spacing: -12px;
                filter: drop-shadow(0 0 2px var(--glow-color));
                opacity: 0.2;
            }
        }

        h1 {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: calc(1.8rem + 2vw);
            line-height: 1.2;
            letter-spacing: 1px;
            margin: 0 0 1.5rem 0;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff 0%, #f3dfa2 30%, #cca450 55%, #ae802b 75%, #ecc670 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            width: 100%;
            word-wrap: break-word;
            animation: frequencyWave 4.5s ease-in-out infinite;
        }
        .subtext {
            font-size: 1rem;
            font-weight: bold;
            color: var(--sub-gray);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0 0 3rem 0;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            line-height: 1.4;
        }
        .section-box {
            width: 100%;
            max-width: 900px;
            background: rgba(12, 12, 12, 0.85);
            border: 1px solid #262118;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            box-sizing: border-box;
            text-align: left;
            margin-bottom: 2rem;
        }
        .section-box h2 {
            font-family: 'Impact', sans-serif;
            font-size: 1.5rem;
            letter-spacing: 1px;
            margin: 0 0 1rem 0;
            color: #f3dfa2;
            text-transform: uppercase;
            border-bottom: 1px solid #262118;
            padding-bottom: 0.5rem;
        }
        .section-box p {
            color: #a8a090;
            font-size: 0.9rem;
            margin: 0 0 1.25rem 0;
            line-height: 1.4;
        }

        /* VIDEO CONTAINER STYLING */
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            background: #000;
            border: 1px solid #3a3326;
            border-radius: 6px;
            margin-bottom: 1rem;
        }
        .video-wrapper video, .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* AI & ADMIN LAYOUTS */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 1rem;
        }
        textarea, input[type="text"] {
            width: 100%;
            background: #0f0f0d;
            border: 1px solid #3a3326;
            border-radius: 4px;
            color: #fff;
            padding: 0.75rem;
            font-family: inherit;
            font-size: 0.95rem;
            box-sizing: border-box;
        }
        textarea { resize: none; height: 70px; }
        .action-btn {
            background: linear-gradient(to bottom, #f3dfa2, #cca450);
            color: #000;
            border: none;
            border-radius: 4px;
            padding: 0.75rem;
            font-weight: bold;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }
        .action-btn:hover { opacity: 0.9; }
        .admin-controls {
            display: none;
            background: #161410;
            border: 1px dashed #cca450;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 6px;
        }

        /* GALLERY */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.2rem;
        }
        .gallery-item {
            background: #111;
            border: 1px solid #222;
            border-radius: 6px;
            height: 240px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s, border-color 0.3s;
        }
        .gallery-item img {
