<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FREQUENCY 528 IRON</title>
    <style>
        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f4f4f4; /* Light industrial background */
            color: #111111;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero-section {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Centered 3-Line Layout with Pulsing Effect */
        .hero-container {
            text-align: center;
            max-width: 1000px;
            width: 100%;
            animation: pulse-glow 3s ease-in-out infinite alternate;
        }

        /* Base Typography Rules for all 3 lines */
        .hero-line {
            font-family: 'Impact', 'Arial Black', sans-serif;
            text-transform: uppercase;
            display: block;
            line-height: 1.1;
        }

        /* Line 1: Muted Industrial Red with Drop Shadow */
        .line-red {
            color: #d62222;
            font-size: 5rem;
            margin-bottom: 5px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.25);
        }

        /* Line 2: Deep Brass/Gold with Drop Shadow */
        .line-gold {
            color: #c59200;
            font-size: 7rem;
            margin-bottom: 5px;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.3);
        }

        /* Line 3: Polished Chrome/Dark Slate Gray with Drop Shadow */
        .line-chrome {
            color: #444444;
            font-size: 6.5rem;
            margin-bottom: 50px;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.25);
        }

        /* Sleek Button to match the light theme */
        .hero-btn {
            display: inline-block;
            padding: 16px 45px;
            background: #111111;
            color: #ffffff;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 3px;
            border: 1px solid #111111;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
            border-radius: 2px;
        }

        .hero-btn:hover {
            background: transparent;
            color: #111111;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        /* Breathing/Pulsing Animation for the text elements */
        @keyframes pulse-glow {
            0% {
                transform: scale(0.99);
                opacity: 0.95;
            }
            100% {
                transform: scale(1.01);
                opacity: 1;
            }
        }

        /* Responsive adjustments for mobile screens */
        @media (max-width: 768px) {
            .line-red { font-size: 3rem; }
            .line-gold { font-size: 4rem; }
            .line-chrome { font-size: 3.8rem; margin-bottom: 35px; }
            .hero-btn { padding: 14px 30px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="hero-container">
            <span class="hero-line line-red">FREQUENCY</span>
            <span class="hero-line line-gold">528</span>
            <span class="hero-line line-chrome">IRON</span>
            
            <a href="#explore" class="hero-btn">EXPLORE THE CRAFTSMANSHIP</a>
        </div>
    </section>

</body>
</html>
