<form name="client-concept" method="POST" data-netlify="true" enctype="multipart/form-data">
    <!-- Hidden input helps Netlify identify the form -->
    <input type="hidden" name="form-name" value="client-concept" />

    <div class="form-row-split">
        <div class="input-group">
            <label for="client-name">Your Name</label>
            <input type="text" id="client-name" name="name" required>
        </div>
        <div class="input-group">
            <label for="client-phone">Mobile Number</label>
            <input type="tel" id="client-phone" name="phone" required>
        </div>
    </div>

    <div class="input-group">
        <label for="home-address">Installation / Home Address</label>
        <input type="text" id="home-address" name="address" required>
    </div>

    <div class="input-group">
        <label for="property-photo">Upload Photo of Your Property</label>
        <input type="file" id="property-photo" name="photo" accept="image/*" required>
    </div>

    <div class="input-group">
        <label for="design-ideas">Describe Your Ironwork Vision</label>
        <textarea id="design-ideas" name="vision" rows="3" required></textarea>
    </div>

    <button type="submit" class="ai-submit-btn">Transmit Concept to 528 Iron</button>
</form>
