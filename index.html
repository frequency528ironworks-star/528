<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequency 528 Iron Works</title>
    <style>
        :root {
            --bg-tan: #d2b48c; /* Rugged Tan Background */
            --blood-red: #660000; /* Dark Blood Red Text */
            --charcoal-black: #111111; /* Deep Black Shadow */
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-tan);
            color: var(--blood-red);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2rem;
            text-align: left;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .logo {
            font-family: 'Impact', Arial, sans-serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: var(--blood-red);
        }

        .logo span {
            color: #000;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        /* Business Card Oval Stamp Layout */
        .stamp-card {
            border: 4px solid var(--blood-red);
            border-radius: 50%; /* Keeps the custom oval stamp shape */
            padding: 4rem 5rem;
            max-width: 750px;
            background: transparent;
            display: inline-block;
        }

        h1 {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 2.8rem; /* Slightly smaller to guarantee perfect centering */
            line-height: 1.2;
            letter-spacing: 2px;
            margin: 0 0 1.5rem 0;
            color: var(--blood-red);
            text-transform: uppercase;
        }

        /* Dark Black Shadow Effect on the Bold Font */
        .highlight {
            text-shadow: 2px 2px 4px var(--charcoal-black), -1px -1px 0 var(--charcoal-black), 1px -1px 0 var(--charcoal-black), -1px 1px 0 var(--charcoal-black), 1px 1px 0 var(--charcoal-black);
        }

        .subtext {
            font-size: 1.1rem;
            font-weight: bold;
            color: #111111;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0;
        }

        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            color: #333333;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">FREQUENCY-<span>528</span> // IRON WORKS</div>
    </header>

    <div class="container">
        <div class="stamp-card">
            <h1>ITS NOT JUST IRON ...<br>ITS <span class="highlight">"FREQUENCY 528"</span> IRON</h1>
            <p class="subtext">Custom Craftsmanship // High-Vibrational Metalwork</p>
        </div>
    </div>

    <footer>
        &copy; 2026 FREQUENCY 528 IRON WORKS. ALL RIGHTS RESERVED.
    </footer>

</body>
</html>
