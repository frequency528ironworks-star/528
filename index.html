<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequency 528 Iron Works</title>
    <style>
        :root {
            --bg-black: #050505; 
            --shadow-gray: #222222; 
            --sub-gray: #888888;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-black);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            cursor: pointer;
        }

        header {
            padding: 2rem;
            text-align: left;
            border-bottom: 1px solid #111111;
        }

        .logo {
            font-family: 'Impact', Arial, sans-serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: #ffffff;
        }

        .logo span {
            color: #888;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        @keyframes frequencyWave {
            0% {
                transform: scale(0.96) skewX(-4deg);
                filter: drop-shadow(2px 2px 3px var(--shadow-gray)) blur(0.5px);
                opacity: 0.85;
            }
            50% {
                transform: scale(1.03) skewX(4deg);
                filter: drop-shadow(6px 6px 25px rgba(255, 255, 255, 0.4)) drop-shadow(4px 4px 5px var(--shadow-gray));
                opacity: 1;
            }
            100% {
                transform: scale(0.96) skewX(-4deg);
                filter: drop-shadow(2px 2px 3px var(--shadow-gray)) blur(0.5px);
                opacity: 0.85;
            }
        }

        h1 {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 4.8rem; 
            line-height: 1.1;
            letter-spacing: 3px;
            margin: 0 0 2.5rem 0;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffffff 0%, #e1e1e1 40%, #a1a1a1 50%, #f1f1f1 60%, #bcbcbc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            white-space: nowrap; 
            animation: frequencyWave 4s ease-in-out infinite;
        }

        .subtext {
            font-size: 1.3rem; 
            font-weight: bold;
            color: var(--sub-gray);
            letter-spacing: 5px;
            text-transform: uppercase;
            margin: 0;
        }

        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid #111111;
            color: #444444;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">FREQUENCY-<span>528</span> // IRON WORKS</div>
    </header>

    <div class="container">
        <h1>ITS NOT JUST IRON ...<br>ITS "FREQUENCY 528" IRON</h1>
        <p class="subtext">Custom Craftsmanship // High-Vibrational Metalwork</p>
    </div>

    <footer>
        &copy; 2026 FREQUENCY 528 IRON WORKS. ALL RIGHTS RESERVED.
    </footer>

    <script>
        let audioCtx = null;

        function startFrequency() {
            if (audioCtx) return; 

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let oscillator = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(528, audioCtx.currentTime);

            // Volume hits immediately, then dissolves exponentially over 3 seconds
            gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 3); 

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 3); // Cuts the feed completely at 3 seconds
        }

        window.addEventListener('click', startFrequency);
        window.addEventListener('touchstart', startFrequency);
    </script>

</body>
</html>
