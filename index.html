<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequency 528 Iron Works</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --text-color: #ffffff;
            --accent-orange: #ff5500;
            --muted-text: #888888;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2rem;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-family: 'Impact', Arial, sans-serif;
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: #fff;
        }

        .logo span {
            color: var(--accent-orange);
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 3.8rem;
            line-height: 1.2;
            letter-spacing: 3px;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .highlight {
            color: var(--accent-orange);
            text-shadow: 0px 0px 25px rgba(255, 85, 0, 0.7);
        }

        .subtext {
            font-size: 1.2rem;
            color: var(--muted-text);
            letter-spacing: 2px;
            text-transform: uppercase;
            max-width: 600px;
            line-height: 1.6;
        }

        footer {
            text-align: center;
            padding: 2rem;
            border-top: 1px solid var(--glass-border);
            color: var(--muted-text);
            font-size: 0.8rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">FREQUENCY-<span>528</span> // IRON WORKS</div>
    </header>

    <div class="container">
        <h1>ITS NOT JUST IRON ...<br>ITS <span class="highlight">"FREQUENCY 528"</span> IRON</h1>
        <p class="subtext">Custom Craftsmanship // High-Vibrational Metalwork</p>
    </div>

    <footer>
        &copy; 2026 FREQUENCY 528 IRON WORKS. ALL RIGHTS RESERVED.
    </footer>

</body>
</html>
