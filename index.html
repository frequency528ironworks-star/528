<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT NOT JUST IRON...ITS FREQUENCY 528 IRON</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --block: #111111; --border: #222; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: #e5e5e5; line-height: 1.4; padding-top: 100px; }

        /* Expert Shimmer Logic */
        .shimmer-text {
            background: linear-gradient(90deg, #fff 30%, var(--gold) 50%, #fff 70%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }
        
        .hero { text-align: center; padding: 20px 10px; }
        .logo-1 { font-size: 1.8rem; font-weight: 900; text-transform: uppercase; }
        .logo-2 { font-size: 2.2rem; font-weight: 900; text-transform: uppercase; }

        /* Compact Grid Architecture */
        .canvas { max-width: 950px; margin: 0 auto; padding: 15px; }
        .block { background-color: var(--block); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .title { font-size: 1.1rem; font-weight: 700; color: #fff; }
        .title span { color: var(--gold); }
        
        .btn-edit { background: #222; color: var(--gold); border: 1px solid var(--gold); padding: 4px 10px; font-size: 0.7rem; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
        
        .input-grid { display: grid; gap: 8px; }
        input, textarea { background: #161616; border: 1px solid #333; border-radius: 4px; padding: 8px; color: #fff; width: 100%; }
        .submit-btn { background: var(--gold); color: #000; border: none; padding: 8px; font-weight: 700; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
        
        @media (min-width: 768px) { .grid-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; } }
    </style>
</head>
<body>
    <header style="position:fixed; top:0; width:100%; background:#000; border-bottom: 2px solid var(--gold); padding:10px; text-align:center; font-size:0.75rem; color:#888;">
        SHANE: 404-807-5409 | HEYLEIGH: 478-331-8547
    </header>

    <main class="canvas">
        <section class="hero">
            <div class="logo-1 shimmer-text">It Not Just Iron...</div>
            <div class="logo-2 shimmer-text">Its Frequency 528 Iron</div>
        </section>

        <div class="grid-col">
            <section class="block">
                <div class="header-row">
                    <h2 class="title">AI <span>Visualizer</span></h2>
                    <button class="btn-edit">Edit / Sign In</button>
                </div>
                <form class="input-grid">
                    <input type="text" placeholder="Project Name">
                    <textarea rows="2" placeholder="Vision Details"></textarea>
                    <button type="submit" class="submit-btn">Transmit</button>
                </form>
            </section>
            <section class="block">
                <div class="header-row">
                    <h2 class="title">Bespoke <span>Showcase</span></h2>
                    <button class="btn-edit">Edit / Sign In</button>
                </div>
                <div style="background:#161616; height:100px; border-radius:4px; display:flex; align-items:center; justify-content:center; color:#444;">Media Player Node</div>
            </section>
        </div>
    </main>

    <script>
        // High-Precision Audio Engine
        let ctx = null;
        function play528(delay) {
            setTimeout(() => {
                if (!ctx) return;
                let osc = ctx.createOscillator();
                let gain = ctx.createGain();
                osc.frequency.setValueAtTime(528, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 1);
            }, delay);
        }
        window.addEventListener('click', () => {
            if (!ctx) {
                ctx = new (window.AudioContext || window.webkitAudioContext)();
                setInterval(() => { play528(0); play528(300); play528(600); }, 120000);
            }
        }, { once: true });
    </script>
</body>
</html>
